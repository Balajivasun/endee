version: '3.8'

services:
  ai_app:
    build: .
    container_name: endee-ai-client
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    # If the endee database is running on the host machine, you may need network mapping 
    # to hit localhost:8080 from within this container (e.g., using host.docker.internal).
    extra_hosts:
      - "host.docker.internal:host-gateway"
